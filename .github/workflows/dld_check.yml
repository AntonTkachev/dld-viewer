name: DLD snapshot check

on:
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Compare DLD API vs data/dld_seen.json
        run: python3 scripts/dld_check_action.py
