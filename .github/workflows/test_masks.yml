name: mask smoke tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test_masks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      # Stdlib-only — no pip install needed.
      - name: Run mask smoke tests
        run: python3 scripts/test_masks.py
