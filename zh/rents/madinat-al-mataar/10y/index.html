// Activate the requested language so detail-panel.js's t() returns localized
// strings. i18n.js exposes a top-level `currentLang` closure variable + a t()
// reader; setting currentLang via applyLang() is enough for our usage.
if (typeof applyLang === 'function') applyLang(PAGE_LANG);
const LOAD_ERR = "\u65e0\u6cd5\u52a0\u8f7d\u6570\u636e";

function periodHref(p) {
  return p === 'all' ? BASE_URL : BASE_URL + p + '/';
}

function applyPeriodCopy(period) {
  if (!PERIOD_COPY || !PERIOD_COPY[period]) return;
  const c = PERIOD_COPY[period];
  document.getElementById('d-name').textContent = c.h1;
  document.getElementById('d-lede').textContent = c.lede;
  if (c.h1) document.title = c.h1 + ' — DXBCompass';
}

async function load() {
  try {
    const res = await fetch(DATA_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const d = await res.json();
    render(d);
  } catch (e) {
    document.getElementById('detail-content').outerHTML =
      `<div class="err">${LOAD_ERR}: ${e.message}</div>`;
  }
}

function render(d) {
  document.getElementById('bc-name').textContent = DISTRICT_NAME;
  applyPeriodCopy(PAGE_PERIOD);

  // Free + premium merge. data.json ships {sales, sales_premium}. Today
  // everyone sees both; when the paywall lands, the auth gate strips the
  // *_premium block server-side so this spread yields just the free fields
  // and the renderer naturally hides empty sections.
  // See docs/data_tiers.md for the field list.
  let sale = null, rent = null;
  if (PAGE_MODE === 'sale') sale = Object.assign({}, d.sales || {}, d.sales_premium || {});
  else                      rent = Object.assign({}, d.rent  || {}, d.rent_premium  || {});

  const listLinks = (PAGE_MODE === 'sale')
    ? { top_projects: BASE_URL + 'projects/',
        top_deals:    BASE_URL + 'deals/',
        recent:       BASE_URL + 'recent/' }
    : { top_projects: BASE_URL + 'projects/',
        recent:       BASE_URL + 'recent/' };

  DetailPanel.mount({
    container: document.getElementById('detail-content'),
    sale, rent,
    mode: PAGE_MODE,
    initialPeriod: PAGE_PERIOD,
    periodHref,
    onPeriodChange: applyPeriodCopy,
    listLinks,
    title: DISTRICT_NAME,
  });
  document.getElementById('detail-content').classList.remove('loading');
}

window.addEventListener('popstate', () => {
  const m = window.location.pathname.match(/\/(?:sales|rents)\/[^/]+\/([^/]+)\/?$/);
  const next = m ? m[1] : 'all';
  applyPeriodCopy(next);
  location.reload();
});

load();
</script>
